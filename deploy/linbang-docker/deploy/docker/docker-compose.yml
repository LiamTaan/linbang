name: linbang

services:
  mysql:
    image: mysql:8.0.36
    container_name: linbang-mysql
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --explicit_defaults_for_timestamp=true
      - --lower_case_table_names=1
    volumes:
      - ${DEPLOY_ROOT}/data/mysql:/var/lib/mysql
      - ${DEPLOY_ROOT}/ruoyi-vue-pro/sql/mysql/建表.sql:/docker-entrypoint-initdb.d/01_create.sql:ro
      - ${DEPLOY_ROOT}/ruoyi-vue-pro/sql/mysql/初始化.sql:/docker-entrypoint-initdb.d/02_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.2-alpine
    container_name: linbang-redis
    restart: unless-stopped
    command: >
      sh -c '
      if [ -n "$$REDIS_PASSWORD" ]; then
        redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD";
      else
        redis-server --appendonly yes;
      fi
      '
    environment:
      TZ: Asia/Shanghai
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - ${DEPLOY_ROOT}/data/redis:/data
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$$REDIS_PASSWORD\" ]; then redis-cli -a \"$$REDIS_PASSWORD\" ping; else redis-cli ping; fi"]
      interval: 10s
      timeout: 5s
      retries: 20

  backend:
    image: eclipse-temurin:8-jre
    container_name: linbang-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    working_dir: /yudao-server
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      YUDAO_CAPTCHA_ENABLE: ${YUDAO_CAPTCHA_ENABLE}
      SERVER_PORT: ${SERVER_PORT}
      JAVA_OPTS: ${JAVA_OPTS}
      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&nullCatalogMeansCurrent=true&rewriteBatchedStatements=true&useUnicode=true&characterEncoding=UTF-8
      DB_USERNAME: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_SLAVE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&nullCatalogMeansCurrent=true&rewriteBatchedStatements=true&useUnicode=true&characterEncoding=UTF-8
      DB_SLAVE_USERNAME: ${MYSQL_USER}
      DB_SLAVE_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DATABASE: ${REDIS_DATABASE}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      ADMIN_UI_URL: ${ADMIN_UI_URL}
      ADMIN_UI_HOST: ${ADMIN_UI_HOST}
      AMAP_WEB_KEY: ${AMAP_WEB_KEY}
      LOG_FILE: ${LOG_FILE}
      WX_MP_APP_ID: ${WX_MP_APP_ID}
      WX_MP_SECRET: ${WX_MP_SECRET}
      WX_MINIAPP_APPID: ${WX_MINIAPP_APPID}
      WX_MINIAPP_SECRET: ${WX_MINIAPP_SECRET}
      JUSTAUTH_DINGTALK_CLIENT_ID: ${JUSTAUTH_DINGTALK_CLIENT_ID}
      JUSTAUTH_DINGTALK_CLIENT_SECRET: ${JUSTAUTH_DINGTALK_CLIENT_SECRET}
      JUSTAUTH_WECHAT_ENTERPRISE_CLIENT_ID: ${JUSTAUTH_WECHAT_ENTERPRISE_CLIENT_ID}
      JUSTAUTH_WECHAT_ENTERPRISE_CLIENT_SECRET: ${JUSTAUTH_WECHAT_ENTERPRISE_CLIENT_SECRET}
      JUSTAUTH_WECHAT_ENTERPRISE_AGENT_ID: ${JUSTAUTH_WECHAT_ENTERPRISE_AGENT_ID}
      JUSTAUTH_ALIPAY_CLIENT_ID: ${JUSTAUTH_ALIPAY_CLIENT_ID}
      JUSTAUTH_ALIPAY_CLIENT_SECRET: ${JUSTAUTH_ALIPAY_CLIENT_SECRET}
      JUSTAUTH_ALIPAY_PUBLIC_KEY: ${JUSTAUTH_ALIPAY_PUBLIC_KEY}
      DRUID_USERNAME: ${DRUID_USERNAME}
      DRUID_PASSWORD: ${DRUID_PASSWORD}
      SPRING_BOOT_ADMIN_USERNAME: ${SPRING_BOOT_ADMIN_USERNAME}
      SPRING_BOOT_ADMIN_PASSWORD: ${SPRING_BOOT_ADMIN_PASSWORD}
      ARGS: ""
    command: sh -c 'java $$JAVA_OPTS -jar /yudao-server/app.jar $$ARGS'
    volumes:
      - ${DEPLOY_ROOT}/ruoyi-vue-pro/yudao-server/target/yudao-server.jar:/yudao-server/app.jar:ro
      - ${UPLOAD_FILES_DIR}:${UPLOAD_FILES_DIR}
      - ${LOG_DIR}:${LOG_DIR}

  nginx:
    image: nginx:1.27-alpine
    container_name: linbang-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${PUBLIC_PORT}:80"
    volumes:
      - ${DEPLOY_ROOT}/deploy/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ${DEPLOY_ROOT}/yudao-ui-admin-vue3/dist-bt:/usr/share/nginx/html:ro
