openapi: 3.0.1
info:
  title: 邻里互助用户中心与资金域核心契约
  version: 2026-06-28
components:
  schemas:
    OrderBusinessCategory:
      type: string
      description: 订单业务分类，供用户中心列表筛选使用
      enum: [WAIT_ACCEPT, IN_SERVICE, FINISHED, AFTER_SALE, WAIT_REVIEW, WAIT_PAY, REFUNDED]
    OrderUnitVerify:
      type: object
      properties:
        unitId: { type: integer, format: int64, description: 单元 ID }
        unitNo: { type: string, description: 单元号 }
        verifyCode: { type: string, description: 单元核销码 }
        verifyStatus: { type: string, description: 核销状态 PENDING/VERIFIED }
        verifyAllowed: { type: boolean, description: 当前是否允许核销 }
        verifyTime: { type: string, format: date-time, description: 核销完成时间 }
        verifyBy: { type: integer, format: int64, description: 核销人用户 ID }
        verifyRemark: { type: string, description: 核销备注 }
    OrderTimelineItem:
      type: object
      properties:
        timelineType: { type: string, description: 时间线类型 ORDER/UNIT/PAY/REFUND/COMPLAINT/APPEAL/LOG/VERIFY }
        bizId: { type: integer, format: int64, description: 关联业务主键 ID }
        unitId: { type: integer, format: int64, description: 关联单元 ID，可为空 }
        title: { type: string, description: 时间线标题 }
        content: { type: string, description: 内容摘要 }
        status: { type: string, description: 当前节点状态或结果 }
        eventTime: { type: string, format: date-time, description: 发生时间 }
    WalletAccount:
      type: object
      properties:
        totalAmount: { type: number, format: double, description: 总资产，单位元 }
        availableAmount: { type: number, format: double, description: 可提现金额，单位元 }
        frozenAmount: { type: number, format: double, description: 冻结金额，单位元 }
        escrowAmount: { type: number, format: double, description: 托管金额，单位元 }
        commissionAmount: { type: number, format: double, description: 佣金金额，单位元 }
        totalPromoteIncome: { type: number, format: double, description: 累计推广收益，单位元 }
        pendingPromoteIncome: { type: number, format: double, description: 待结算推广收益，单位元 }
        defaultBankCard:
          type: object
          description: 默认收款账户摘要
          properties:
            id: { type: integer, format: int64, description: 银行卡 ID }
            bankName: { type: string, description: 银行名称 }
            cardNoMask: { type: string, description: 卡号脱敏展示 }
            accountName: { type: string, description: 开户人 }
        benefits:
          type: array
          description: 权益摘要列表
          items:
            type: object
            properties:
              benefitType: { type: string, description: 权益类型 }
              benefitTitle: { type: string, description: 权益标题 }
              benefitDesc: { type: string, description: 权益说明 }
    MemberRoleApply:
      type: object
      properties:
        applyRoleCode: { type: string, description: 申请角色 PROMOTER/PARTNER/PLATFORM_OPERATOR；服务商 MERCHANT 通过独立入驻流程开通 }
        applyReason: { type: string, description: 申请原因 }
        resourceDesc: { type: string, description: 资源说明；代理、推广员重点字段 }
        expectedConversionDesc: { type: string, description: 预期转化说明；推广员重点字段 }
        abilityDesc: { type: string, description: 能力说明；平台管理员重点字段 }
        availableTimeDesc: { type: string, description: 可投入时间说明；平台管理员重点字段 }
        auditStatus: { type: string, description: 审核状态 PENDING/APPROVED/REJECTED }
    MerchantEntry:
      type: object
      properties:
        entryNo: { type: string, description: 服务商入驻单号 }
        merchantId: { type: integer, format: int64, description: 关联服务商 ID }
        merchantName: { type: string, description: 服务商名称 }
        contactName: { type: string, description: 联系人 }
        contactMobile: { type: string, description: 联系电话 }
        regionCode: { type: string, description: 服务区域编码 }
        serviceCategoryIds:
          type: array
          description: 服务类目 ID 列表
          items: { type: integer, format: int64 }
        qualificationIds:
          type: array
          description: 资质 ID 列表
          items: { type: integer, format: int64 }
        status: { type: string, description: 入驻状态 PENDING/FIRST_APPROVED/APPROVED/REJECTED }
        progressStatus: { type: string, description: 进度状态 PENDING_FIRST_AUDIT/PENDING_FINAL_AUDIT/APPROVED_WAIT_BANK_CARD/APPROVED_ENABLED/REJECTED }
        currentStageName: { type: string, description: 当前阶段名称 }
        currentStageTime: { type: string, format: date-time, description: 当前阶段时间 }
        rejectReason: { type: string, description: 驳回原因 }
        onboardingBlockedReason: { type: string, description: 入驻阻塞原因 }
        acceptEnabled: { type: boolean, description: 是否已开通接单 }
        bankCardRequired: { type: boolean, description: 是否需要绑定银行卡后才能接单 }
    MerchantOnboardingProgress:
      type: object
      properties:
        entryId: { type: integer, format: int64, description: 入驻申请 ID }
        progressStatus: { type: string, description: 进度状态 PENDING_FIRST_AUDIT/PENDING_FINAL_AUDIT/APPROVED_WAIT_BANK_CARD/APPROVED_ENABLED/REJECTED }
        currentStageName: { type: string, description: 当前阶段名称 }
        currentStageTime: { type: string, format: date-time, description: 当前阶段时间 }
        rejectReason: { type: string, description: 驳回原因 }
        blockedReason: { type: string, description: 当前阻塞原因 }
        nextAction: { type: string, description: 下一步动作提示 }
        acceptEnabled: { type: boolean, description: 是否已开通接单 }
    UserReminder:
      type: object
      properties:
        id: { type: integer, format: int64, description: 提醒 ID；系统提醒可为空 }
        reminderType: { type: string, description: 提醒类型 BIRTHDAY/QUALIFICATION_EXPIRY/CUSTOM_EVENT }
        title: { type: string, description: 提醒标题 }
        content: { type: string, description: 提醒内容 }
        eventTime: { type: string, format: date-time, description: 事件时间 }
        nextRemindTime: { type: string, format: date-time, description: 下一次提醒时间 }
        lastTriggerTime: { type: string, format: date-time, description: 最近一次触发时间 }
        repeatType: { type: string, description: 重复规则 NONE/YEARLY }
        status: { type: string, description: 提醒状态 ACTIVE/TRIGGERED/DISABLED/EXPIRED }
        systemGenerated: { type: boolean, description: 是否系统生成提醒 }
        editable: { type: boolean, description: 当前是否允许编辑 }
        bizId: { type: integer, format: int64, description: 关联业务 ID，例如资质 ID 或提醒 ID }
        routeType: { type: string, description: 路由类型 }
        routeValue: { type: string, description: 路由值 }
    ReminderHistory:
      type: object
      properties:
        messageRecordId: { type: integer, format: int64, description: 消息记录 ID }
        reminderId: { type: integer, format: int64, description: 来源提醒 ID；资质提醒为空 }
        reminderType: { type: string, description: 提醒类型 BIRTHDAY/QUALIFICATION_EXPIRY/CUSTOM_EVENT }
        title: { type: string, description: 提醒标题 }
        contentSnapshot: { type: string, description: 提醒内容快照 }
        readStatus: { type: string, description: 已读状态 UNREAD/READ }
        sendTime: { type: string, format: date-time, description: 发送时间 }
        bizId: { type: integer, format: int64, description: 关联业务 ID }
    RewardOrder:
      type: object
      properties:
        id: { type: integer, format: int64, description: 悬赏申请 ID }
        merchantId: { type: integer, format: int64, description: 服务商 ID }
        title: { type: string, description: 悬赏标题 }
        description: { type: string, description: 悬赏说明 }
        evidenceFileIdsJson: { type: string, description: 凭证文件 ID 列表 JSON }
        auditStatus: { type: string, description: 审核状态 PENDING/APPROVED/REJECTED }
        auditRemark: { type: string, description: 审核备注 }
        rejectReason: { type: string, description: 驳回原因 }
        priorityEnabled: { type: boolean, description: 是否已生效优先展示资格 }
        effectiveStartTime: { type: string, format: date-time, description: 生效开始时间 }
        effectiveEndTime: { type: string, format: date-time, description: 生效结束时间 }
        createTime: { type: string, format: date-time, description: 创建时间 }
    RewardOrderParticipation:
      type: object
      properties:
        id: { type: integer, format: int64, description: 参与记录 ID }
        rewardOrderId: { type: integer, format: int64, description: 悬赏申请 ID }
        rewardTitle: { type: string, description: 悬赏标题 }
        rewardUserId: { type: integer, format: int64, description: 悬赏发布用户 ID }
        participantUserId: { type: integer, format: int64, description: 参与用户 ID }
        participantNickname: { type: string, description: 参与用户昵称快照 }
        participantMobile: { type: string, description: 参与用户手机号快照 }
        status: { type: string, description: 参与状态 PENDING/ACCEPTED/REJECTED/CANCELLED }
        participateRemark: { type: string, description: 参与说明 }
        auditRemark: { type: string, description: 审核备注 }
        createTime: { type: string, format: date-time, description: 创建时间 }
    WalletWithdraw:
      type: object
      properties:
        applyAmount: { type: number, format: double, description: 申请提现金额，单位元 }
        feeAmount: { type: number, format: double, description: 提现手续费，单位元 }
        realAmount: { type: number, format: double, description: 实际到账金额，单位元 }
        auditStatus: { type: string, description: 审核状态 PENDING/APPROVED/REJECTED }
        status: { type: string, description: 提现状态 PENDING/APPROVED/SUCCESS/REJECTED/FAILED }
        payTime: { type: string, format: date-time, description: 打款成功时间 }
        rejectReason: { type: string, description: 驳回或失败原因 }
    RefundRecord:
      type: object
      properties:
        refundAmount: { type: number, format: double, description: 退款金额，单位元 }
        auditStatus: { type: string, description: 审核状态 }
        status: { type: string, description: 退款状态 }
        successTime: { type: string, format: date-time, description: 退款成功时间 }
        channelErrorMsg: { type: string, description: 渠道失败原因 }
    HelpFaq:
      type: object
      properties:
        id: { type: integer, format: int64, description: 常见问题 ID }
        categoryCode: { type: string, description: 常见问题分类编码 FUNDS 资金与提现、ORDER 订单相关、AUTH 认证与入驻、MATCH 抢单与匹配、PROMOTE 推广与佣金 }
        categoryName: { type: string, description: 分类名称，App 常见问题入口展示 }
        title: { type: string, description: 问题标题，支持 App 搜索 }
        content: { type: string, description: 问题答案正文，说明规则、处理路径和注意事项 }
        icon: { type: string, description: App 图标标识，例如 fund/order/verify/order_match/voice }
        sortNo: { type: integer, description: 排序号，数值越小越靠前 }
        status: { type: string, description: 状态 ENABLE 启用展示、DISABLE 停用隐藏 }
    HelpFeedback:
      type: object
      properties:
        id: { type: integer, format: int64, description: 反馈 ID }
        userId: { type: integer, format: int64, description: 反馈用户 ID }
        feedbackType: { type: string, description: 反馈分类，按平台配置展示，例如 功能建议、异常反馈、投诉建议 }
        content: { type: string, description: 反馈内容 }
        contactMobile: { type: string, description: 联系电话 }
        attachmentUrls: { type: string, description: 附件地址，多个以逗号分隔 }
        status: { type: string, description: 处理状态 PENDING 待处理、PROCESSING 处理中、FINISHED 已完结 }
        handleRemark: { type: string, description: 处理备注 }
        createTime: { type: string, format: date-time, description: 创建时间 }
    CommissionRecord:
      type: object
      properties:
        targetType: { type: string, description: 分账去向 merchant/platform/partner/promoter/tax }
        amount: { type: number, format: double, description: 分账金额，单位元 }
        rate: { type: number, format: double, description: 分账比例 }
        settleStatus: { type: string, description: PENDING/SETTLED/REFUNDED }
    EscrowProof:
      type: object
      properties:
        proofNo: { type: string, description: 托管凭证编号 }
        orderId: { type: integer, format: int64, description: 关联订单 ID }
        unitId: { type: integer, format: int64, description: 关联单元 ID }
        escrowAmount: { type: number, format: double, description: 托管金额，单位元 }
        proofStatus: { type: string, description: LOCKED/UNLOCKED/REFUNDED }
        lockReason: { type: string, description: 锁定原因 }
        unlockReason: { type: string, description: 解锁原因 }
        createTime: { type: string, format: date-time, description: 生成时间 }
