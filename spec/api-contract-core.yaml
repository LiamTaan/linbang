notes:
  mandatory_alignment:
    - "字段名与数据库表字段保持 camelCase 映射一致"
    - "状态值必须来自 spec/business-rules.yaml"
    - "管理端列表与详情接口字段名必须一致"
    - "审核接口统一使用 auditStatus/auditRemark/rejectReason"
    - "不得随意更改 path 前缀或响应包装"
  app_auth_notes:
    - "login 同时承担短信登录与短信注册；手机号未注册时，验证码校验成功后自动创建账号并返回正式登录态"
    - "send-sms-code 为短信登录与短信注册共用验证码发送接口"
    - "App 原生第三方登录当前仅支持 type=32 微信开放平台授权、type=40 支付宝授权"
    - "social-login 在未绑定手机号时返回成功响应，bindRequired=true，且 accessToken/refreshToken/userId 可以为空"
    - "social-bind-mobile 会校验短信验证码；手机号未注册则自动创建账号，手机号已注册则绑定到既有账号，并返回正式登录态"
    - "socialType 使用芋道 SocialTypeEnum，当前按正式方案承接微信与支付宝快捷登录"
