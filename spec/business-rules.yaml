project: 邻里互助
module: 用户中心与资金域
version: 2026-06-28

rules:
  user_center:
    order_management:
      business_categories:
        WAIT_ACCEPT: "待接；主订单状态 PENDING_ACCEPT"
        IN_SERVICE: "服务中；主订单状态 ACCEPTED、SERVING、PENDING_CONFIRM"
        FINISHED: "已完成；主订单状态 FINISHED 且当前用户已评价"
        AFTER_SALE: "售后；主订单状态 AFTER_SALE 或存在投诉/申诉处理中"
        WAIT_REVIEW: "待评价；派生分类，主订单状态 FINISHED 且当前用户尚未提交评价"
        WAIT_PAY: "待付款；主订单状态 PENDING_PAY"
        REFUNDED: "已退款；主订单状态 REFUNDED"
      update_rule: "仅允许在待付款、待接单阶段修改地址、预约说明、需求描述、附件、服务时长类字段"
      cancel_rule: "仅允许在待付款、待接单阶段取消，必须记录取消原因和操作日志"
      verify_rule:
        scope: "订单单元级一次性核销，不提供主订单级核销"
        status_flow:
          - PENDING
          - VERIFIED
        allowed_unit_status:
          - ACCEPTED
          - SERVING
          - PENDING_CONFIRM
        effects:
          - "核销成功后单元状态变更为 FINISHED"
          - "如存在后续锁定单元，则自动解锁下一单元"
          - "联动主订单状态重算、资金结算、推广收益结算"
    account_management:
      overview_fields:
        - availableAmount
        - frozenAmount
        - escrowAmount
        - totalPromoteIncome
        - pendingPromoteIncome
      wallet_bill_scope:
        - ORDER_PAY
        - SETTLEMENT_UNLOCK
        - WITHDRAW_APPLY
        - WITHDRAW_SUCCESS
        - WITHDRAW_FAILED
        - REFUND_SUCCESS
      receiving_account_rule: "收款账户统一复用银行卡实体，对用户端语义展示为收款账户"
      card_package_rule: "优惠券与积分复用既有 member / promotion 能力，不重复建模"
    qualification_and_auth:
      qualification_reminder_rule: "资质到期提醒写入站内消息记录，并对用户端开放提醒查询"
      auth_summary_rule: "认证进度统一返回实名、资质、证件状态与即将到期标记"
    reminder:
      custom_reminder_rule: "用户自定义提醒独立落 lb_user_reminder，支持生日提醒、自定义事件提醒的真实 CRUD"
      reminder_types:
        - BIRTHDAY
        - QUALIFICATION_EXPIRY
        - CUSTOM_EVENT
      repeat_types:
        - NONE
        - YEARLY
      history_rule: "提醒触发历史复用站内消息记录 lb_message_record，不重复建提醒历史表"
    reward_order:
      minimum_scope_rule: "本轮我的悬赏最小闭环复用晒单悬赏申请 lb_showcase_reward，不额外新建平行悬赏主表"
      publish_scope:
        - MY_PUBLISHED
      participate_scope:
        - MY_PARTICIPATED
        - PARTICIPATION_RECORD
      audit_rule: "悬赏申请提交后进入 PENDING，后台审核通过后开启有限期优先展示资格"
    role_apply:
      role_codes:
        - PROMOTER
        - PARTNER
        - PLATFORM_OPERATOR
      promoter_fields:
        - resourceDesc
        - expectedConversionDesc
      partner_fields:
        - resourceDesc
      platform_operator_fields:
        - abilityDesc
        - availableTimeDesc
      team_stats_rule: "两级分销统计仅做直推一级与间推二级只读展示，不改动现有结算链路"
  payment:
    order_status_flow:
      - PENDING_PAY
      - PENDING_ACCEPT
      - ACCEPTED
      - SERVING
      - PENDING_CONFIRM
      - FINISHED
      - AFTER_SALE
      - REFUNDED
      - CLOSED
    pay_success:
      wallet_effect: "订单金额进入托管金额 escrowAmount，不进入可提现金额"
      order_effect: "订单进入待接单"
  escrow:
    states:
      - LOCKED
      - UNLOCKED
      - REFUNDED
    lock_rule: "用户支付成功后按订单/单元生成托管凭证"
    unlock_rule: "单元完工且用户确认后，对应单元托管金额解锁进入可提现金额"
  withdraw:
    min_amount: 10.00
    require_real_name: true
    require_enabled_bank_card: true
    status_flow:
      - PENDING
      - APPROVED
      - SUCCESS
      - REJECTED
      - FAILED
    rules:
      - "申请时从 availableAmount 冻结到 frozenAmount"
      - "审核通过后必须创建真实转账单"
      - "转账成功后扣减 frozenAmount"
      - "转账失败或审核驳回后退回 availableAmount"
  refund:
    allowed_order_status:
      - PENDING_ACCEPT
      - ACCEPTED
    allowed_unit_status:
      - PENDING_ACCEPT
      - ACCEPTED
    status_flow:
      - PENDING
      - APPROVED
      - REJECTED
      - SUCCESS
      - FAILED
    rules:
      - "退款成功后优先冲减 escrowAmount，再同步订单/单元状态"
      - "退款必须支持整单和单元维度"
  divide:
    rule_source: lb_divide_rule
    dimensions:
      - cityLevel
      - categoryId
    allocation_targets:
      - merchant
      - platform
      - partner
      - promoter
      - tax
    tax_rule:
      licensed: "不额外代扣个税"
      unlicensed: "按 taxWithholdRate 代扣"
  app_config:
    required_keys:
      - linbang.app.tax-reminder
      - linbang.app.license-agent-entry-url
      - linbang.app.license-agent-entry-title
      - linbang.app.withdraw-notice
